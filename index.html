<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyzed - Account Checker</title>
  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
      min-height: 100vh;
    }
    
    .glass-card {
      background: rgba(22, 22, 35, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .gradient-border {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      padding: 1px;
      border-radius: 1rem;
    }
    
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      border-color: #6366f1 !important;
    }
    
    .result-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .result-card:hover {
      transform: translateY(-2px);
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    
    .status-approved {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    
    .status-declined {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    .status-pending {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1e1e2e;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #6366f1;
      border-radius: 3px;
    }
    
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #6366f1;
      margin: 0 2px;
      animation: typing 1.4s infinite both;
    }
    
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
</head>
<body class="text-gray-200">

  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- HEADER -->
    <div class="text-center mb-12 animate__animated animate__fadeInDown">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-600 mb-6 shadow-lg shadow-indigo-500/20">
        <i data-lucide="zap" class="w-10 h-10 text-white"></i>
      </div>
      <h1 class="text-4xl md:text-5xl font-bold mb-3 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
        Lyzed Checker
      </h1>
      <p class="text-gray-400 text-lg">Valide contas de forma rápida e eficiente</p>
    </div>

    <!-- INPUT CARD -->
    <div class="gradient-border mb-8 animate__animated animate__fadeInUp">
      <div class="glass-card rounded-2xl p-6 md:p-8">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1">
            <label class="block text-sm font-medium text-gray-400 mb-2">
              <i data-lucide="mail" class="inline w-4 h-4 mr-1"></i>
              Lista de Contas
            </label>
            <textarea 
              id="listaInput"
              rows="4"
              class="w-full px-4 py-3 rounded-xl bg-gray-900/50 border border-gray-700 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-500 input-glow transition-all resize-none"
              placeholder="Formato: email:senha&#10;Exemplo:&#10;usuario@email.com:123456&#10;joao@email.com:senha123"
            ></textarea>
            <p class="text-xs text-gray-500 mt-2">
              <i data-lucide="info" class="inline w-3 h-3"></i>
              Cada linha no formato: email:senha
            </p>
          </div>
          
          <div class="md:w-48 flex flex-col gap-3">
            <label class="block text-sm font-medium text-gray-400 mb-2">Ações</label>
            <button 
              id="checkBtn"
              class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl font-semibold text-white hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20">
              <i data-lucide="play" class="w-4 h-4"></i>
              Verificar
            </button>
            <button 
              id="clearBtn"
              class="w-full py-3 bg-gray-800/50 rounded-xl font-semibold text-gray-400 hover:bg-gray-800 hover:text-white transition-all flex items-center justify-center gap-2">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
              Limpar
            </button>
            <button 
              id="stopBtn"
              class="w-full py-3 bg-gray-800/50 rounded-xl font-semibold text-gray-400 hover:bg-gray-800 hover:text-white transition-all flex items-center justify-center gap-2 disabled:opacity-50"
              disabled>
              <i data-lucide="square" class="w-4 h-4"></i>
              Parar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- STATS CARD -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 animate__animated animate__fadeInUp animate__delay-1s">
      <div class="glass-card rounded-xl p-4 text-center">
        <i data-lucide="list" class="w-6 h-6 text-indigo-400 mx-auto mb-2"></i>
        <p class="text-2xl font-bold" id="totalCount">0</p>
        <p class="text-xs text-gray-500">Total</p>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <i data-lucide="check-circle" class="w-6 h-6 text-green-500 mx-auto mb-2"></i>
        <p class="text-2xl font-bold text-green-500" id="approvedCount">0</p>
        <p class="text-xs text-gray-500">Aprovadas</p>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <i data-lucide="x-circle" class="w-6 h-6 text-red-500 mx-auto mb-2"></i>
        <p class="text-2xl font-bold text-red-500" id="declinedCount">0</p>
        <p class="text-xs text-gray-500">Reprovadas</p>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <i data-lucide="loader" class="w-6 h-6 text-yellow-500 mx-auto mb-2"></i>
        <p class="text-2xl font-bold text-yellow-500" id="pendingCount">0</p>
        <p class="text-xs text-gray-500">Processando</p>
      </div>
    </div>

    <!-- FILTER TABS -->
    <div class="flex gap-2 mb-4 animate__animated animate__fadeInUp animate__delay-2s">
      <button data-filter="all" class="filter-btn px-5 py-2 rounded-lg bg-indigo-600 text-white transition-all text-sm font-medium">
        Todos
      </button>
      <button data-filter="approved" class="filter-btn px-5 py-2 rounded-lg bg-gray-800/50 text-gray-400 hover:bg-gray-800 transition-all text-sm font-medium">
        Aprovadas
      </button>
      <button data-filter="declined" class="filter-btn px-5 py-2 rounded-lg bg-gray-800/50 text-gray-400 hover:bg-gray-800 transition-all text-sm font-medium">
        Reprovadas
      </button>
      <button data-filter="pending" class="filter-btn px-5 py-2 rounded-lg bg-gray-800/50 text-gray-400 hover:bg-gray-800 transition-all text-sm font-medium">
        Processando
      </button>
    </div>

    <!-- RESULTS CARD -->
    <div class="glass-card rounded-2xl overflow-hidden animate__animated animate__fadeInUp animate__delay-2s">
      <div class="px-6 py-4 border-b border-gray-800 flex justify-between items-center">
        <h3 class="font-semibold flex items-center gap-2">
          <i data-lucide="clipboard-list" class="w-5 h-5 text-indigo-400"></i>
          Resultados
        </h3>
        <div class="typing-indicator" id="typingIndicator" style="display: none;">
          <span></span><span></span><span></span>
        </div>
      </div>
      
      <div id="resultsContainer" class="divide-y divide-gray-800 max-h-[600px] overflow-y-auto">
        <div class="p-12 text-center text-gray-500">
          <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
          <p>Nenhum resultado ainda</p>
          <p class="text-sm mt-1">Adicione contas e clique em Verificar</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // API URL
    const API_URL = 'http://localhost:3000/api/checker';
    
    // Elementos
    const listaInput = document.getElementById('listaInput');
    const checkBtn = document.getElementById('checkBtn');
    const clearBtn = document.getElementById('clearBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const typingIndicator = document.getElementById('typingIndicator');
    
    // Contadores
    let totalCount = 0;
    let approvedCount = 0;
    let declinedCount = 0;
    let pendingCount = 0;
    
    // Resultados armazenados
    let results = [];
    let currentFilter = 'all';
    
    // Controle de parada
    let isChecking = false;
    let abortController = null;
    
    // Atualiza contadores na tela
    function updateCounters() {
      document.getElementById('totalCount').textContent = totalCount;
      document.getElementById('approvedCount').textContent = approvedCount;
      document.getElementById('declinedCount').textContent = declinedCount;
      document.getElementById('pendingCount').textContent = pendingCount;
    }
    
    // Função para criar card de aprovado com VPS (compacto)
    function createVpsCard(vpsData, userData) {
      if (!vpsData || vpsData.length === 0) return '';
      
      const vps = vpsData[0];
      
      return `
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="status-badge status-approved">
                <i data-lucide="check-circle" class="w-3 h-3"></i>
                APROVADA
              </span>
              <span class="text-xs text-green-500/70">Login válido</span>
            </div>
            <p class="font-mono text-sm text-gray-300 break-all">${userData.email || 'N/A'}</p>
            <p class="text-xs text-green-500/70 mt-1">Saldo: R$ ${(userData.saldo || 0).toFixed(2).replace('.', ',')}</p>
            
            <!-- Informações da VPS em linha compacta -->
            <div class="mt-2 flex flex-wrap items-center gap-3 text-xs">
              <span class="flex items-center gap-1 text-indigo-400">
                <i data-lucide="server" class="w-3 h-3"></i>
                ${vps.ip || 'N/A'}
              </span>
              <span class="text-gray-600">|</span>
              <span class="flex items-center gap-1 text-gray-400">
                <i data-lucide="cpu" class="w-3 h-3"></i>
                ${vps.cores || 'N/A'}
              </span>
              <span class="text-gray-600">|</span>
              <span class="flex items-center gap-1 text-gray-400">
                <i data-lucide="hard-drive" class="w-3 h-3"></i>
                ${vps.ram_gb || 'N/A'} GB RAM
              </span>
              <span class="text-gray-600">|</span>
              <span class="flex items-center gap-1 text-gray-400">
                <i data-lucide="database" class="w-3 h-3"></i>
                ${vps.disco_gb || 'N/A'} GB SSD
              </span>
              <span class="text-gray-600">|</span>
              <span class="flex items-center gap-1 text-yellow-500">
                <i data-lucide="calendar" class="w-3 h-3"></i>
                ${vps.vencimento || 'N/A'}
              </span>
              <span class="text-gray-600">|</span>
              <span class="flex items-center gap-1 text-gray-500">
                <i data-lucide="box" class="w-3 h-3"></i>
                ${vps.vps_type || 'LXC'}
              </span>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="copyToClipboard('${userData.email.replace(/'/g, "\\'")}', '')" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all">
              <i data-lucide="copy" class="w-4 h-4 text-gray-400"></i>
            </button>
          </div>
        </div>
      `;
    }
    
    // Função para criar card de aprovado sem VPS
    function createApprovedCard(email, message, userData) {
      return `
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="status-badge status-approved">
                <i data-lucide="check-circle" class="w-3 h-3"></i>
                APROVADA
              </span>
              <span class="text-xs text-green-500/70">Login válido</span>
            </div>
            <p class="font-mono text-sm text-gray-300 break-all">${email}</p>
            ${userData && userData.saldo !== undefined ? `<p class="text-xs text-green-500/70 mt-1">Saldo: R$ ${(userData.saldo || 0).toFixed(2).replace('.', ',')}</p>` : ''}
            ${message && message !== 'Login aprovado!' ? `<p class="text-xs text-green-500/70 mt-1">${message}</p>` : ''}
          </div>
          <div class="flex gap-2">
            <button onclick="copyToClipboard('${email.replace(/'/g, "\\'")}', '')" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-all">
              <i data-lucide="copy" class="w-4 h-4 text-gray-400"></i>
            </button>
          </div>
        </div>
      `;
    }
    
    // Renderiza resultados com filtro
    function renderResults() {
      let filteredResults = results;
      
      if (currentFilter === 'approved') {
        filteredResults = results.filter(r => r.status === 'approved');
      } else if (currentFilter === 'declined') {
        filteredResults = results.filter(r => r.status === 'declined');
      } else if (currentFilter === 'pending') {
        filteredResults = results.filter(r => r.status === 'pending');
      }
      
      if (filteredResults.length === 0) {
        resultsContainer.innerHTML = `
          <div class="p-12 text-center text-gray-500">
            <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
            <p>Nenhum resultado ${currentFilter === 'all' ? '' : 'com este filtro'}</p>
            <p class="text-sm mt-1">${currentFilter === 'all' ? 'Adicione contas e clique em Verificar' : 'Tente outro filtro'}</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }
      
      resultsContainer.innerHTML = filteredResults.map(result => {
        // Se for aprovada e tiver dados de VPS
        if (result.status === 'approved' && result.vps_data && result.vps_data.length > 0) {
          return `
            <div class="p-4 hover:bg-white/5 transition-all result-card" data-status="${result.status}">
              ${createVpsCard(result.vps_data, result.user_data || { email: result.email, saldo: result.saldo })}
            </div>
          `;
        } 
        // Se for aprovada sem VPS
        else if (result.status === 'approved') {
          return `
            <div class="p-4 hover:bg-white/5 transition-all result-card" data-status="${result.status}">
              ${createApprovedCard(result.email, result.message, result.user_data)}
            </div>
          `;
        }
        // Se for pendente
        else if (result.status === 'pending') {
          return `
            <div class="p-4 hover:bg-white/5 transition-all result-card" data-status="${result.status}">
              <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="status-badge status-pending">
                      <i data-lucide="loader" class="w-3 h-3"></i>
                      PROCESSANDO
                    </span>
                  </div>
                  <p class="font-mono text-sm text-gray-300 break-all">${result.email}</p>
                  <p class="text-xs text-yellow-500/70 mt-1">${result.message || 'Verificando...'}</p>
                </div>
              </div>
            </div>
          `;
        }
        // Se for recusado
        else {
          return `
            <div class="p-4 hover:bg-white/5 transition-all result-card" data-status="${result.status}">
              <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="status-badge status-declined">
                      <i data-lucide="x-circle" class="w-3 h-3"></i>
                      REPROVADA
                    </span>
                  </div>
                  <p class="font-mono text-sm text-gray-300 break-all">${result.email}</p>
                  <p class="text-xs text-red-500/70 mt-1">${result.message || 'Credenciais inválidas'}</p>
                </div>
              </div>
            </div>
          `;
        }
      }).join('');
      
      lucide.createIcons();
    }

    // funcao para verificar proxy
    async function checkProxy(proxy) {
      // GET  /api/test-proxy          - Testa o proxy 
      try {
        // {"proxy_working":true,"proxy_url":"http:***@change4.owlproxy.com:7778"}
        const response = await fetch('http://localhost:3000/api/test-proxy', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          },
          signal: abortController.signal
        });

        const data = await response.json();
        if (data.proxy_working) {
          console.log('Proxy funcionando:', data.proxy_url);
          return data.proxy_url;
        } else {
          console.warn('Proxy não funciona mais, buscando outro...');
          return null;
        }
      } catch (error) {
        console.error('Erro ao testar proxy:', error);
        return null;
      }
    }
    
    // Função para verificar uma conta
    async function checkAccount(account, index) {
      if (isChecking) {
        return;
      }
      
      const parts = account.split(':');
      const email = parts[0] || '';
      const senha = parts[1] || '';
      
      if (!email || !senha) {
        updateResult(index, {
          ...results[index],
          status: 'declined',
          message: 'Formato inválido'
        });
        pendingCount--;
        declinedCount++;
        updateCounters();
        renderResults();
        return;
      }
      
      try {
        // testa proxy antes de verificar conta, se o "working_proxy" for false, nao inicia a verificacao e mostra mensagem de erro
        const proxyUrl = await checkProxy();

        if (proxyUrl.working === false) {
          updateResult(index, {
            ...results[index],
            status: 'declined',
            message: 'Proxy não funciona mais'
          });
          pendingCount--;
          declinedCount++;
          updateCounters();
          renderResults();
          return;
        }

        const response = await fetch(`${API_URL}?lista=${encodeURIComponent(account)}`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          },
          signal: abortController.signal
        });
        
        const data = await response.json();
        
        if (data.status === 'approved') {
          updateResult(index, {
            ...results[index],
            status: 'approved',
            message: data.message || 'Login aprovado!',
            vps_data: data.vps ? [data.vps] : null,
            user_data: data.dados_usuario || data.user,
            saldo: data.dados_usuario?.saldo || 0
          });
          approvedCount++;
        } else {
          updateResult(index, {
            ...results[index],
            status: 'declined',
            message: data.message || 'Credenciais inválidas'
          });
          declinedCount++;
        }
      } catch (error) {
        if (error.name === 'AbortError') {
          return;
        }
        
        updateResult(index, {
          ...results[index],
          status: 'declined',
          message: `Erro: ${error.message}`
        });
        declinedCount++;
      } finally {
        pendingCount--;
        updateCounters();
        renderResults();
      }
    }
    
    // Atualiza resultado específico
    function updateResult(index, newResult) {
      results[index] = newResult;
    }
    
    // Função para parar o processo de verificação
    function stopChecking() {
      isChecking = true;
      if (abortController) {
        abortController.abort();
      }
      typingIndicator.style.display = 'none';
      checkBtn.disabled = false;
      checkBtn.style.opacity = '1';
      stopBtn.disabled = true;
      
      renderResults();
    }
    
    // Função principal de verificação
    async function startChecking() {
      const text = listaInput.value.trim();
      if (!text) {
        alert('Por favor, adicione algumas contas para verificar');
        return;
      }
      
      // Reset
      const lines = text.split('\n').filter(line => line.trim());
      totalCount = lines.length;
      approvedCount = 0;
      declinedCount = 0;
      pendingCount = totalCount;
      
      results = lines.map(line => {
        const parts = line.split(':');
        return {
          original: line,
          email: parts[0] || line,
          password: parts[1] || '',
          status: 'pending',
          message: 'Verificando...'
        };
      });
      
      updateCounters();
      renderResults();
      
      // Mostra indicador de processamento
      typingIndicator.style.display = 'flex';
      checkBtn.disabled = true;
      checkBtn.style.opacity = '0.5';
      stopBtn.disabled = false;
      
      // Criar novo AbortController
      abortController = new AbortController();
      isChecking = false;
      
      // Processa em paralelo com limite de 5 simultâneos
      const concurrency = 5;
      let activeCount = 0;
      let currentIndex = 0;
      
      return new Promise((resolve) => {
        function processNext() {
          if ((currentIndex >= results.length && activeCount === 0) || isChecking) {
            resolve();
            return;
          }
          
          while (activeCount < concurrency && currentIndex < results.length && !isChecking) {
            const index = currentIndex++;
            activeCount++;
            
            checkAccount(lines[index], index).finally(() => {
              activeCount--;
              if (!isChecking) {
                processNext();
              }
            });
          }
        }
        
        processNext();
      }).finally(() => {
        typingIndicator.style.display = 'none';
        checkBtn.disabled = false;
        checkBtn.style.opacity = '1';
        stopBtn.disabled = true;
        isChecking = false;
      });
    }
    
    // Limpar tudo
    function clearAll() {
      listaInput.value = '';
      results = [];
      totalCount = 0;
      approvedCount = 0;
      declinedCount = 0;
      pendingCount = 0;
      currentFilter = 'all';
      isChecking = false;
      updateCounters();
      renderResults();
      stopBtn.disabled = true;
      
      // Reset filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-indigo-600', 'text-white');
        btn.classList.add('bg-gray-800/50', 'text-gray-400');
      });
      document.querySelector('[data-filter="all"]').classList.remove('bg-gray-800/50', 'text-gray-400');
      document.querySelector('[data-filter="all"]').classList.add('bg-indigo-600', 'text-white');
    }
    
    // Copiar para clipboard
    window.copyToClipboard = function(email, password) {
      const textToCopy = password ? `${email}:${password}` : email;
      navigator.clipboard.writeText(textToCopy);
      
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-green-400 px-4 py-2 rounded-lg text-sm z-50 animate__animated animate__fadeInUp';
      toast.innerHTML = '<i data-lucide="check" class="inline w-4 h-4 mr-1"></i> Copiado!';
      document.body.appendChild(toast);
      lucide.createIcons();
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    };
    
    // Configurar filtros
    function setupFilters() {
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => {
            b.classList.remove('bg-indigo-600', 'text-white');
            b.classList.add('bg-gray-800/50', 'text-gray-400');
          });
          btn.classList.remove('bg-gray-800/50', 'text-gray-400');
          btn.classList.add('bg-indigo-600', 'text-white');
          
          currentFilter = btn.dataset.filter;
          renderResults();
        });
      });
    }
    
    // Event listeners
    checkBtn.addEventListener('click', startChecking);
    clearBtn.addEventListener('click', clearAll);
    stopBtn.addEventListener('click', stopChecking);
    
    // Inicializar ícones e filtros
    lucide.createIcons();
    setupFilters();
    
    // Placeholder animado
    const placeholders = [
      'usuario@email.com:senha123',
      'joao@email.com:minhasenha',
      'Adicione uma conta por linha...'
    ];
    let placeholderIndex = 0;
    setInterval(() => {
      placeholderIndex = (placeholderIndex + 1) % placeholders.length;
      listaInput.placeholder = placeholders[placeholderIndex];
    }, 3000);
  </script>
</body>
</html>
